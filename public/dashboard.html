<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кабинет стримера — Pay2Draw</title>
<style>
  body { font-family: system-ui, sans-serif; background:#111; color:#eee; margin:0; padding:24px; }
  h1 { font-size: 20px; }
  .layout { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
  .feed-col { flex:1; min-width:280px; }
  .side-col { width:280px; flex-shrink:0; }
  .empty { color:#777; margin-top:20px; }
  @media (max-width: 640px) {
    .side-col { width:100%; }
  }

  .feed { display:flex; flex-direction:column; gap:12px; margin-top:16px; }
  .feed-item { background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:12px; display:flex; gap:12px; max-width:460px; }
  .feed-item img { width:80px; height:45px; object-fit:cover; border-radius:6px; background:#fff; flex-shrink:0; cursor:zoom-in; }
  .feed-body { flex:1; min-width:0; }
  .feed-meta { font-size:13px; color:#aaa; margin-bottom:6px; }
  .feed-caption { font-size:13px; color:#ddd; font-style:italic; margin-bottom:6px; }
  .feed-actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  button { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
  .approve { background:#2e7d32; color:#fff; }
  .reject { background:#7d2e2e; color:#fff; }
  .stop { background:#7d5a1f; color:#fff; }
  .replay { background:#1f3b5b; color:#fff; }

  .badge { padding:3px 8px; border-radius:5px; font-size:12px; }
  .badge-pending { background:#5b4b1f; color:#f0c674; }
  .badge-approved { background:#1f4b2f; color:#7ad08a; }
  .badge-showing { background:#1f3b5b; color:#7ab0f0; }
  .badge-shown { background:#333; color:#aaa; }
  .badge-rejected { background:#4b1f1f; color:#f08a8a; }
  .badge-awaiting_payment { background:#333; color:#999; }
  .badge-payment_failed { background:#4b1f1f; color:#f08a8a; }

  .preview-box { background:#000; border:1px solid #333; border-radius:10px; overflow:hidden; aspect-ratio:16/9; }
  .preview-box iframe { width:100%; height:100%; border:none; }
  .preview-label { font-size:12px; color:#999; margin:0 0 6px; }

  .balance-box { background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:16px; margin-top:16px; }
  .balance-amount { font-size:26px; font-weight:bold; }
  .payout-btn { width:100%; margin-top:10px; background:#5b5bd6; color:#fff; border:none; padding:10px; border-radius:6px; cursor:pointer; }
  .payout-btn:disabled { background:#444; cursor:not-allowed; }
  .meta { font-size:13px; color:#aaa; margin:8px 0; }
  .payout-history { margin-top:12px; font-size:13px; color:#999; }
  .payout-history div { padding:4px 0; border-top:1px solid #2a2a2a; }

  .links-box { margin-top:14px; padding-top:14px; border-top:1px solid #2a2a2a; font-size:13px; }
  .links-box .label { color:#999; margin-top:10px; }
  .links-box .label:first-child { margin-top:0; }
  .copy-row { display:flex; gap:6px; margin-top:4px; }
  .copy-row input { flex:1; min-width:0; background:#111; border:1px solid #333; color:#666; border-radius:6px; padding:6px 8px; font-size:12px; }
  .copy-btn { padding:6px 10px; background:#333; color:#eee; border:none; border-radius:6px; cursor:pointer; font-size:12px; white-space:nowrap; }
  .copy-btn.copied { background:#2e7d32; }

  .promo-box { background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:16px; margin-top:16px; }
  .promo-gen { display:flex; gap:8px; margin-top:8px; }
  .promo-gen input { width:60px; background:#111; border:1px solid #333; color:#eee; border-radius:6px; padding:6px 8px; }
  .promo-gen button { background:#5b5bd6; color:#fff; flex:1; padding:8px; font-size:13px; }
  .promo-list { margin-top:12px; display:flex; flex-direction:column; gap:6px; max-height:260px; overflow-y:auto; }
  .promo-row { display:flex; align-items:center; gap:6px; font-size:12px; background:#111; border:1px solid #2a2a2a; border-radius:6px; padding:6px 8px; }
  .promo-code { font-family:monospace; flex:1; }
  .promo-row button { padding:4px 8px; font-size:11px; }
  .promo-status { padding:2px 6px; border-radius:4px; font-size:11px; }
  .promo-status.active { background:#1f4b2f; color:#7ad08a; }
  .promo-status.deactivated { background:#4b1f1f; color:#f08a8a; }
  .promo-status.used { background:#333; color:#999; }

  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:200; cursor:zoom-out; padding:24px; box-sizing:border-box; }
  .lightbox img { max-width:100%; max-height:100%; border-radius:10px; box-shadow:0 10px 50px rgba(0,0,0,.6); }
</style>
</head>
<body>
  <h1 id="title">Кабинет <button onclick="logout()" style="float:right;background:#333;color:#eee;padding:6px 12px;font-size:13px;">Выйти</button></h1>

  <div class="lightbox" id="lightbox"><img id="lightboxImg"></div>

  <div class="layout">
    <div class="feed-col">
      <p class="meta">История донатов (обновляется каждые 5 сек)</p>
      <div class="feed" id="feed"></div>
      <p class="empty" id="empty" style="display:none">Пока нет донатов.</p>
    </div>

    <div class="side-col">
      <p class="preview-label">Сейчас на стриме (OBS)</p>
      <div class="preview-box"><iframe id="overlayFrame"></iframe></div>

      <div class="balance-box">
        <div>Доступно к выводу</div>
        <div class="balance-amount" id="balance">— ₽</div>
        <button class="payout-btn" id="payoutBtn" onclick="requestPayout()">Запросить выплату</button>
        <p class="meta">Выплата по СБП на указанный при регистрации номер, вручную, в течение 24 часов.</p>
        <div class="payout-history" id="payoutHistory"></div>

        <div class="links-box">
          <div class="label">Ссылка для зрителей:</div>
          <div class="copy-row">
            <input id="donateLink" type="password" readonly value="">
            <button class="copy-btn" data-target="donateLink">Копировать</button>
          </div>
          <div class="label">Оверлей для OBS:</div>
          <div class="copy-row">
            <input id="overlayLink" type="password" readonly value="">
            <button class="copy-btn" data-target="overlayLink">Копировать</button>
          </div>
        </div>
      </div>

      <div class="promo-box">
        <div>Промокоды на бесплатный донат</div>
        <div class="promo-gen">
          <input type="number" id="promoCount" min="1" max="10" value="1">
          <button id="promoGenBtn">Сгенерировать</button>
        </div>
        <div class="promo-list" id="promoList"></div>
      </div>
    </div>
  </div>

<script>
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

async function checkAuth() {
  const res = await fetch('/api/me');
  if (!res.ok) {
    window.location.href = '/login.html';
    return false;
  }
  const me = await res.json();
  document.getElementById('title').firstChild.textContent = `Кабинет — ${me.name} `;
  document.getElementById('overlayFrame').src = `/overlay.html?slug=${me.slug}`;

  const donateUrl = `${location.origin}/draw.html?slug=${me.slug}`;
  const overlayUrl = `${location.origin}/overlay.html?slug=${me.slug}`;
  document.getElementById('donateLink').value = donateUrl;
  document.getElementById('overlayLink').value = overlayUrl;
  return true;
}

document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const input = document.getElementById(btn.dataset.target);
    await navigator.clipboard.writeText(input.value);
    const original = btn.textContent;
    btn.textContent = 'Скопировано';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1500);
  });
});

// --- lightbox: expand a drawing within the page (not the OS Fullscreen API) ---
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
lightbox.addEventListener('click', () => { lightbox.style.display = 'none'; });

// --- notification beep: Web Audio tone, no audio file needed ---
let audioCtx;
function playNotificationSound() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  } catch (e) { /* audio not available */ }
}

const STATUS_LABELS = {
  awaiting_payment: 'ожидает оплаты',
  payment_failed: 'оплата не прошла',
  pending: 'на модерации',
  approved: 'в очереди показа',
  showing: 'сейчас в эфире',
  shown: 'показ завершён',
  rejected: 'отклонено',
};

let knownIds = null;

async function loadFeed() {
  const res = await fetch('/api/drawings?limit=50');
  if (res.status === 401) return window.location.href = '/login.html';
  if (!res.ok) return;
  const rows = await res.json();

  if (knownIds === null) {
    knownIds = new Set(rows.map(d => d.id));
  } else {
    const hasNewPending = rows.some(d => d.status === 'pending' && !knownIds.has(d.id));
    if (hasNewPending) playNotificationSound();
    knownIds = new Set(rows.map(d => d.id));
  }

  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');
  empty.style.display = rows.length ? 'none' : 'block';

  feed.innerHTML = rows.map(d => {
    const date = new Date(Number(d.created_at)).toLocaleString('ru-RU');
    const needsModeration = d.status === 'pending';
    return `
      <div class="feed-item" data-id="${d.id}">
        <img src="${d.image_data}" class="feed-thumb">
        <div class="feed-body">
          <div class="feed-meta">
            ${date} · ${d.amount} ₽ <span style="color:#777">(тебе ${d.streamer_amount} ₽)</span> · показ ${d.duration_sec} сек
          </div>
          ${d.caption ? `<div class="feed-caption">«${d.caption}»</div>` : ''}
          <span class="badge badge-${d.status}">${STATUS_LABELS[d.status] || d.status}</span>
          ${needsModeration ? `
            <div class="feed-actions">
              <button class="approve">Показать</button>
              <button class="reject">Отклонить</button>
            </div>
          ` : ''}
          ${d.status === 'showing' ? `
            <div class="feed-actions">
              <button class="stop">Снять с эфира</button>
            </div>
          ` : ''}
          ${d.status === 'shown' ? `
            <div class="feed-actions">
              <button class="replay">Показать снова</button>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');

  feed.querySelectorAll('.feed-item').forEach(item => {
    const id = item.dataset.id;
    const approveBtn = item.querySelector('.approve');
    const rejectBtn = item.querySelector('.reject');
    const stopBtn = item.querySelector('.stop');
    const replayBtn = item.querySelector('.replay');
    const thumb = item.querySelector('.feed-thumb');
    if (approveBtn) approveBtn.onclick = () => act(id, 'approve');
    if (rejectBtn) rejectBtn.onclick = () => act(id, 'reject');
    if (stopBtn) stopBtn.onclick = () => act(id, 'stop');
    if (replayBtn) replayBtn.onclick = () => act(id, 'replay');
    thumb.onclick = () => {
      lightboxImg.src = thumb.src;
      lightbox.style.display = 'flex';
    };
  });
}

async function act(id, action) {
  await fetch(`/api/drawings/${id}/${action}`, { method: 'POST' });
  loadFeed();
}

async function loadBalance() {
  const res = await fetch('/api/payout/balance');
  if (!res.ok) return;
  const data = await res.json();
  document.getElementById('balance').textContent = data.balance + ' ₽';
  document.getElementById('payoutBtn').disabled = data.balance <= 0;
}

async function loadPayoutHistory() {
  const res = await fetch('/api/payout/requests');
  if (!res.ok) return;
  const rows = await res.json();
  const el = document.getElementById('payoutHistory');
  el.innerHTML = rows.map(r => {
    const date = new Date(Number(r.requested_at)).toLocaleString('ru-RU');
    const statusText = r.status === 'paid' ? '✅ выплачено' : '⏳ ожидает выплаты';
    return `<div>${date} — ${r.amount} ₽ — ${statusText}</div>`;
  }).join('');
}

async function requestPayout() {
  const res = await fetch('/api/payout/requests', { method: 'POST' });
  const data = await res.json();
  if (data.error) return alert(data.error);
  alert(`Запрос на выплату ${data.amount} ₽ отправлен. Выплатим вручную по СБП в течение 24 часов.`);
  loadBalance();
  loadPayoutHistory();
}

function promoStatusLabel(p) {
  if (p.used_at) return { cls: 'used', text: 'использован' };
  if (p.status === 'deactivated') return { cls: 'deactivated', text: 'деактивирован' };
  return { cls: 'active', text: 'активен' };
}

async function loadPromoCodes() {
  const res = await fetch('/api/promo-codes');
  if (!res.ok) return;
  const rows = await res.json();
  const el = document.getElementById('promoList');
  el.innerHTML = rows.map(p => {
    const label = promoStatusLabel(p);
    const toggleText = p.status === 'active' ? 'Деактивировать' : 'Активировать';
    return `
      <div class="promo-row" data-id="${p.id}">
        <span class="promo-code">${p.code}</span>
        <span class="promo-status ${label.cls}">${label.text}</span>
        <button class="promo-toggle">${toggleText}</button>
        <button class="promo-delete">Удалить</button>
      </div>
    `;
  }).join('');

  el.querySelectorAll('.promo-row').forEach(row => {
    const id = row.dataset.id;
    row.querySelector('.promo-toggle').onclick = async () => {
      await fetch(`/api/promo-codes/${id}/toggle`, { method: 'POST' });
      loadPromoCodes();
    };
    row.querySelector('.promo-delete').onclick = async () => {
      await fetch(`/api/promo-codes/${id}`, { method: 'DELETE' });
      loadPromoCodes();
    };
  });
}

document.getElementById('promoGenBtn').onclick = async () => {
  const count = Math.min(Math.max(parseInt(document.getElementById('promoCount').value, 10) || 1, 1), 10);
  await fetch('/api/promo-codes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ count }),
  });
  loadPromoCodes();
};

(async () => {
  if (!(await checkAuth())) return;
  loadFeed();
  loadBalance();
  loadPayoutHistory();
  loadPromoCodes();
  setInterval(loadFeed, 5000);
  setInterval(loadBalance, 5000);
})();
</script>
</body>
</html>
