<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кабинет стримера — StreamCanvas</title>
<style>
  body { font-family: system-ui, sans-serif; background:#111; color:#eee; margin:0; padding:24px; }
  h1 { font-size: 20px; }
  .layout { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
  .feed-col { flex:1; min-width:280px; }
  .side-col { width:280px; flex-shrink:0; }
  .empty { color:#777; margin-top:20px; }
  @media (max-width: 640px) {
    .side-col { width:100%; }
  }

  .feed { display:flex; flex-direction:column; gap:12px; margin-top:16px; }
  .feed-item { background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:12px; display:flex; gap:12px; max-width:460px; }
  .feed-item img { width:80px; height:45px; object-fit:cover; border-radius:6px; background:#fff; flex-shrink:0; }
  .feed-body { flex:1; min-width:0; }
  .feed-meta { font-size:13px; color:#aaa; margin-bottom:6px; }
  .feed-actions { display:flex; gap:8px; margin-top:8px; }
  button { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
  .approve { background:#2e7d32; color:#fff; }
  .reject { background:#7d2e2e; color:#fff; }

  .badge { padding:3px 8px; border-radius:5px; font-size:12px; }
  .badge-pending { background:#5b4b1f; color:#f0c674; }
  .badge-approved { background:#1f4b2f; color:#7ad08a; }
  .badge-showing { background:#1f3b5b; color:#7ab0f0; }
  .badge-rejected { background:#4b1f1f; color:#f08a8a; }
  .badge-awaiting_payment { background:#333; color:#999; }
  .badge-payment_failed { background:#4b1f1f; color:#f08a8a; }

  .preview-box { background:#000; border:1px solid #333; border-radius:10px; overflow:hidden; aspect-ratio:16/9; }
  .preview-box iframe { width:100%; height:100%; border:none; }
  .preview-label { font-size:12px; color:#999; margin:0 0 6px; }

  .balance-box { background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:16px; margin-top:16px; }
  .balance-amount { font-size:26px; font-weight:bold; }
  .payout-btn { width:100%; margin-top:10px; background:#5b5bd6; color:#fff; border:none; padding:10px; border-radius:6px; cursor:pointer; }
  .payout-btn:disabled { background:#444; cursor:not-allowed; }
  .meta { font-size:13px; color:#aaa; margin:8px 0; }
  .payout-history { margin-top:12px; font-size:13px; color:#999; }
  .payout-history div { padding:4px 0; border-top:1px solid #2a2a2a; }

  .links-box { margin-top:14px; padding-top:14px; border-top:1px solid #2a2a2a; font-size:13px; }
  .links-box a { color:#8ab4ff; word-break:break-all; display:block; margin-top:4px; }
  .links-box .label { color:#999; margin-top:10px; }
  .links-box .label:first-child { margin-top:0; }
</style>
</head>
<body>
  <h1 id="title">Кабинет <button onclick="logout()" style="float:right;background:#333;color:#eee;padding:6px 12px;font-size:13px;">Выйти</button></h1>

  <div class="layout">
    <div class="feed-col">
      <p class="meta">История донатов (обновляется каждые 5 сек)</p>
      <div class="feed" id="feed"></div>
      <p class="empty" id="empty" style="display:none">Пока нет донатов.</p>
    </div>

    <div class="side-col">
      <p class="preview-label">Сейчас на стриме (OBS)</p>
      <div class="preview-box"><iframe id="overlayFrame"></iframe></div>

      <div class="balance-box">
        <div>Доступно к выводу</div>
        <div class="balance-amount" id="balance">— ₽</div>
        <button class="payout-btn" id="payoutBtn" onclick="requestPayout()">Запросить выплату</button>
        <p class="meta">Выплата по СБП на указанный при регистрации номер, вручную, в течение 24 часов.</p>
        <div class="payout-history" id="payoutHistory"></div>

        <div class="links-box">
          <div class="label">Ссылка для зрителей:</div>
          <a id="donateLink" href="#"></a>
          <div class="label">Оверлей для OBS:</div>
          <a id="overlayLink" href="#"></a>
        </div>
      </div>
    </div>
  </div>

<script>
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

async function checkAuth() {
  const res = await fetch('/api/me');
  if (!res.ok) {
    window.location.href = '/login.html';
    return false;
  }
  const me = await res.json();
  document.getElementById('title').firstChild.textContent = `Кабинет — ${me.name} `;
  document.getElementById('overlayFrame').src = `/overlay.html?slug=${me.slug}`;

  const donateUrl = `${location.origin}/draw.html?slug=${me.slug}`;
  const overlayUrl = `${location.origin}/overlay.html?slug=${me.slug}`;
  const donateLink = document.getElementById('donateLink');
  const overlayLink = document.getElementById('overlayLink');
  donateLink.href = donateUrl;
  donateLink.textContent = donateUrl;
  overlayLink.href = overlayUrl;
  overlayLink.textContent = overlayUrl;
  return true;
}

const STATUS_LABELS = {
  awaiting_payment: 'ожидает оплаты',
  payment_failed: 'оплата не прошла',
  pending: 'на модерации',
  approved: 'в очереди показа',
  showing: 'показано',
  rejected: 'отклонено',
};

async function loadFeed() {
  const res = await fetch('/api/drawings?limit=50');
  if (res.status === 401) return window.location.href = '/login.html';
  if (!res.ok) return;
  const rows = await res.json();
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');
  empty.style.display = rows.length ? 'none' : 'block';

  feed.innerHTML = rows.map(d => {
    const date = new Date(Number(d.created_at)).toLocaleString('ru-RU');
    const needsModeration = d.status === 'pending';
    return `
      <div class="feed-item" data-id="${d.id}">
        <img src="${d.image_data}">
        <div class="feed-body">
          <div class="feed-meta">
            ${date} · ${d.amount} ₽ <span style="color:#777">(тебе ${d.streamer_amount} ₽)</span> · показ ${d.duration_sec} сек
          </div>
          <span class="badge badge-${d.status}">${STATUS_LABELS[d.status] || d.status}</span>
          ${needsModeration ? `
            <div class="feed-actions">
              <button class="approve">Показать</button>
              <button class="reject">Отклонить</button>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');

  feed.querySelectorAll('.feed-item').forEach(item => {
    const id = item.dataset.id;
    const approveBtn = item.querySelector('.approve');
    const rejectBtn = item.querySelector('.reject');
    if (approveBtn) approveBtn.onclick = () => act(id, 'approve');
    if (rejectBtn) rejectBtn.onclick = () => act(id, 'reject');
  });
}

async function act(id, action) {
  await fetch(`/api/drawings/${id}/${action}`, { method: 'POST' });
  loadFeed();
}

async function loadBalance() {
  const res = await fetch('/api/payout/balance');
  if (!res.ok) return;
  const data = await res.json();
  document.getElementById('balance').textContent = data.balance + ' ₽';
  document.getElementById('payoutBtn').disabled = data.balance <= 0;
}

async function loadPayoutHistory() {
  const res = await fetch('/api/payout/requests');
  if (!res.ok) return;
  const rows = await res.json();
  const el = document.getElementById('payoutHistory');
  el.innerHTML = rows.map(r => {
    const date = new Date(Number(r.requested_at)).toLocaleString('ru-RU');
    const statusText = r.status === 'paid' ? '✅ выплачено' : '⏳ ожидает выплаты';
    return `<div>${date} — ${r.amount} ₽ — ${statusText}</div>`;
  }).join('');
}

async function requestPayout() {
  const res = await fetch('/api/payout/requests', { method: 'POST' });
  const data = await res.json();
  if (data.error) return alert(data.error);
  alert(`Запрос на выплату ${data.amount} ₽ отправлен. Выплатим вручную по СБП в течение 24 часов.`);
  loadBalance();
  loadPayoutHistory();
}

(async () => {
  if (!(await checkAuth())) return;
  loadFeed();
  loadBalance();
  loadPayoutHistory();
  setInterval(loadFeed, 5000);
  setInterval(loadBalance, 5000);
})();
</script>
</body>
</html>
