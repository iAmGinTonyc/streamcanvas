<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pay2Draw — вход</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 0 16px; background:#111; color:#eee; }
  input { width: 100%; padding: 10px; margin: 6px 0 16px; box-sizing: border-box; background:#222; color:#eee; border:1px solid #444; border-radius:6px; }
  button { width:100%; padding: 10px 20px; cursor: pointer; background:#5b5bd6; color:#fff; border:none; border-radius:6px; font-size:15px; }
  label { font-size: 14px; color:#aaa; }
  a { color: #8ab4ff; }
  .alt { margin-top: 16px; font-size: 14px; color:#999; text-align:center; }
</style>
</head>
<body>
  <h1>Вход в кабинет</h1>
  <label>Email</label>
  <input id="email" type="email" placeholder="you@example.com">
  <label>Пароль</label>
  <input id="password" type="password" placeholder="••••••••">
  <button onclick="login()">Войти</button>
  <p class="alt">Нет кабинета? <a href="/signup.html">Зарегистрироваться</a></p>

<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return alert('Заполни email и пароль');
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  if (data.error) return alert(data.error);
  window.location.href = '/dashboard.html';
}
</script>
</body>
</html>
