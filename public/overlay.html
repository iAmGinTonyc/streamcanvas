<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pay2Draw Overlay</title>
<style>
  html, body { margin:0; background:transparent; overflow:hidden; height:100%; }
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  #img { width:100%; max-height:85%; object-fit:contain; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,.6); display:none; }
  #caption { display:none; color:#fff; font-family:system-ui, sans-serif; font-size:20px; font-weight:bold; text-align:center; text-shadow:0 2px 6px rgba(0,0,0,.9); max-width:90%; }
</style>
</head>
<body>
  <img id="img">
  <div id="caption"></div>
<script>
const slug = new URLSearchParams(location.search).get('slug');

function playPresetSound(id) {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (id === 'bell') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1500, now);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      osc.start(now); osc.stop(now + 0.6);
    } else if (id === 'horn') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, now);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
    } else if (id === 'laser') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(1400, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
    } else if (id === 'drum') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
    }
  } catch (e) { /* audio not available */ }
}

async function tick() {
  if (!slug) return;
  const res = await fetch(`/api/overlay/${slug}/current`);
  const data = await res.json();
  const img = document.getElementById('img');
  const caption = document.getElementById('caption');
  if (data.sound) playPresetSound(data.sound);
  if (data.drawing) {
    if (img.src !== data.drawing.image_data) img.src = data.drawing.image_data;
    img.style.display = 'block';
    if (data.drawing.caption) {
      caption.textContent = data.drawing.caption;
      caption.style.display = 'block';
    } else {
      caption.style.display = 'none';
    }
  } else {
    img.style.display = 'none';
    caption.style.display = 'none';
  }
}
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
